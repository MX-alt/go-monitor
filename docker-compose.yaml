version: '3.3'

services:
  # 1. 我们的 Go 监控服务
  go-monitor:
    build: .
    ports:
      - "8081:8081"
    restart: always

  # 2. 容器化的 Nginx 负载均衡器
  nginx-proxy:
    image: nginx:alpine           # 使用最轻量的 Nginx 镜像
    ports:
      - "8080:8080"               # 映射 8080 端口到容器
    volumes:
      - ./nginx-dist.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - go-monitor                # 确保 Go 启动后再启动 Nginx